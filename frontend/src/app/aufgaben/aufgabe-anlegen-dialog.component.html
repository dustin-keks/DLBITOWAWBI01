<h1 mat-dialog-title>
  {{ aufgabe ? 'Aufgabe bearbeiten' : 'Neue Aufgabe anlegen' }}
</h1>

<mat-dialog-content>
  <form id="aufgabeAnlegenForm" (submit)="speichern($event)">
    <mat-form-field class="w-100">
      <mat-label>Titel der Aufgabe</mat-label>
      <input matInput type="text" [formField]="aufgabeForm.titel" autocomplete="off">

      @if (aufgabeForm.titel().touched() && aufgabeForm.titel().invalid()) {
        <mat-error>{{aufgabeForm.titel().errors()[0].message}}</mat-error>
      }
    </mat-form-field>

    <mat-form-field class="w-100">
      <mat-label>Beschreibung</mat-label>
      <textarea matInput [formField]="aufgabeForm.beschreibung" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton type="button" (click)="abbrechen()">Abbrechen</button>
  <button matButton="filled" type="submit" form="aufgabeAnlegenForm">
    {{ aufgabe ? 'Aufgabe speichern' : 'Neue Aufgabe anlegen' }}
  </button>
</mat-dialog-actions>
